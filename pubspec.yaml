name: smart_ride_ug
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  flutter_animate: ^4.5.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  geolocator: ^14.0.3
  flutter_bloc: ^9.1.1
  equatable: 2.1.0
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.5.0

  # --- FIREBASE DEPENDENCIES ---
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_messaging: ^16.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/bus_logo.png
    - assets/icon/Smartride.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/Smartride.png"
  adaptive_icon_background: "#0B2450"
  adaptive_icon_foreground: "assets/images/bus_logo.png"
