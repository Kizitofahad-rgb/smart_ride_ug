name: smart_ride_ug
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0 # Navigation
  flutter_animate: ^4.5.0 # Premium animations
  flutter_map: ^7.0.0 # Map functionality
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/bus_logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/bus_logo.png"
